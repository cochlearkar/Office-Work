<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Department Task Dashboard</h2>

<div class="form">

  <!-- Department -->
  <select id="department" id="department">
    <option value="">Select Department</option>
    <option value="child">Child Health</option>
    <option value="oral">Oral Health</option>
    <option value="ci">Cochlear Implant</option>
  </select>

  <!-- Employee -->
  <select id="employee">
    <option value="">Select Employee</option>
  </select>

  <input id="task" placeholder="Task" />

  <select id="priority">
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>

  <input id="days" type="number" placeholder="Deadline (days)" />

  <button onclick="addTask()">Add Task</button>

</div>

<div id="dashboard"></div>

<script type="module" src="app.js"></script>

</body>
</html>
