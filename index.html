<!DOCTYPE html>
<html>
<head>
  <title>Office Task Manager</title>

  <style>
    body { font-family: Arial; margin: 20px; }

    button { margin: 5px; padding: 6px 10px; }

    input, select { margin: 5px; padding: 6px; }

    .card {
      border-radius: 10px;
      padding: 10px;
      margin: 10px 0;
    }

    .green { background: #d4edda; }
    .yellow { background: #fff3cd; }
    .red { background: #f8d7da; }

    .employee { font-weight: bold; }

    .section { margin-top: 5px; font-weight: bold; }

    .p1 { color: red; font-weight: bold; }
    .p2 { color: orange; font-weight: bold; }
    .p3 { color: blue; font-weight: bold; }
    .p4 { color: gray; }

  </style>
</head>

<body>

<h2>Office Task Manager</h2>

<b>Select Department:</b><br>
<button onclick="selectDepartment('child')">Child Health</button>
<button onclick="selectDepartment('oral')">Oral Health</button>
<button onclick="selectDepartment('ci')">Cochlear Implant</button>

<div id="employees"></div>

<br>

<input id="task" placeholder="Enter Task">

<select id="priority">
  <option value="p1">P1 (Red Flag)</option>
  <option value="p2">P2 (Orange Flag)</option>
  <option value="p3">P3 (Blue Flag)</option>
  <option value="p4">P4 (Low)</option>
</select>

<select id="repeat">
  <option value="none">No Repeat</option>
  <option value="daily">Daily</option>
  <option value="weekly">Weekly</option>
  <option value="7">Every 7 Days</option>
</select>

<select id="days">
  <option value="0">Today</option>
  <option value="1">Tomorrow</option>
  <option value="2">In 2 days</option>
  <option value="3">In 3 days</option>
  <option value="5">In 5 days</option>
</select>

<button id="mainBtn" onclick="addTask()">Add Task</button>

<hr>

<div id="dashboard"></div>

<script type="module" src="app.js"></script>

</body>
</html>
