<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>TaskFlow – Office Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── TOP HEADER ─────────────────────────────────── -->
<header class="app-header">
  <div class="header-inner">
    <div class="header-brand">
      <span class="brand-icon">⚕</span>
      <div>
        <div class="brand-name">TaskFlow</div>
        <div class="brand-sub">Office Manager</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="hdr-btn" onclick="toggleStats()" id="statsToggleBtn" title="Stats">📊</button>
      <button class="hdr-btn" onclick="exportTasks()" title="Export">📤</button>
    </div>
  </div>
</header>

<!-- ── STATS STRIP (hidden by default) ────────────── -->
<div class="stats-strip" id="statsStrip" style="display:none"></div>

<!-- ── DEPT TABS ──────────────────────────────────── -->
<div class="dept-tabs-wrap">
  <div class="dept-tabs" id="deptTabs">
    <button class="dept-tab active" data-dept="child" onclick="selectDepartment('child')">👶 Child</button>
    <button class="dept-tab" data-dept="oral" onclick="selectDepartment('oral')">🦷 Oral</button>
    <button class="dept-tab" data-dept="ci" onclick="selectDepartment('ci')">🔊 CI</button>
  </div>
</div>

<!-- ── ADD TASK BAR ───────────────────────────────── -->
<div class="add-bar-wrap">
  <div class="add-bar">
    <div class="add-row">
      <input id="task" class="task-input" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask()"/>
      <button class="add-btn" onclick="addTask()" id="mainBtn">＋</button>
    </div>
    <div class="add-meta-row">
      <select id="assignTo" class="mini-select">
        <option value="">— Assign to —</option>
      </select>
      <select id="days" class="mini-select">
        <option value="0">Today</option>
        <option value="1">Tomorrow</option>
        <option value="2">In 2 days</option>
        <option value="3">In 3 days</option>
        <option value="5">In 5 days</option>
        <option value="7">In 1 week</option>
      </select>
      <select id="repeat" class="mini-select">
        <option value="none">No repeat</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
      </select>
      <div class="pri-group">
        <button class="pri-chip" id="p1" onclick="selectPriority('p1')" title="Urgent">🚩</button>
        <button class="pri-chip" id="p2" onclick="selectPriority('p2')" title="High">🔶</button>
        <button class="pri-chip" id="p3" onclick="selectPriority('p3')" title="Normal">🔷</button>
        <button class="pri-chip selected" id="p4" onclick="selectPriority('p4')" title="Low">🩶</button>
      </div>
    </div>
  </div>
</div>

<!-- ── FILTER CHIPS ───────────────────────────────── -->
<div class="filter-row">
  <button class="fchip active" onclick="setFilter('all',this)">All</button>
  <button class="fchip" onclick="setFilter('pending',this)">Pending</button>
  <button class="fchip" onclick="setFilter('overdue',this)">⚠ Overdue</button>
  <button class="fchip" onclick="setFilter('completed',this)">Done</button>
  <div class="filter-spacer"></div>
  <select class="sort-select" onchange="setSortMode(this.value)">
    <option value="priority">↕ Priority</option>
    <option value="date">↕ Date</option>
    <option value="name">↕ Name</option>
  </select>
</div>

<!-- ── EMPLOYEE CARDS ─────────────────────────────── -->
<div class="cards-list" id="dashboard">
  <div class="loading-state">
    <div class="spinner"></div>
    <p>Loading tasks…</p>
  </div>
</div>

<!-- ── EDIT MODAL ─────────────────────────────────── -->
<div class="modal-overlay" id="editModal" style="display:none" onclick="closeEditIfOutside(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Task</div>
    <input id="editTask" class="modal-input" placeholder="Task description"/>
    <div class="modal-row">
      <select id="editDays" class="mini-select flex1">
        <option value="0">Today</option>
        <option value="1">Tomorrow</option>
        <option value="2">In 2 days</option>
        <option value="3">In 3 days</option>
        <option value="5">In 5 days</option>
        <option value="7">In 1 week</option>
      </select>
      <select id="editRepeat" class="mini-select flex1">
        <option value="none">No repeat</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
      </select>
    </div>
    <div class="modal-pri-row">
      <button class="pri-chip" id="ep1" onclick="selectEditPriority('p1')" title="Urgent">🚩 Urgent</button>
      <button class="pri-chip" id="ep2" onclick="selectEditPriority('p2')" title="High">🔶 High</button>
      <button class="pri-chip" id="ep3" onclick="selectEditPriority('p3')" title="Normal">🔷 Normal</button>
      <button class="pri-chip" id="ep4" onclick="selectEditPriority('p4')" title="Low">🩶 Low</button>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="modal-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- ── DELETE CONFIRM ─────────────────────────────── -->
<div class="modal-overlay" id="deleteModal" style="display:none">
  <div class="modal-sheet compact">
    <div class="modal-handle"></div>
    <div class="del-icon">🗑</div>
    <div class="modal-title">Delete this task?</div>
    <p class="modal-sub">This cannot be undone.</p>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="modal-del-btn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
