<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Department Task Dashboard</h2>

<!-- Departments -->
<div>
  <button onclick="selectDepartment('child')">Child Health</button>
  <button onclick="selectDepartment('oral')">Oral Health</button>
  <button onclick="selectDepartment('ci')">Cochlear Implant</button>
</div>

<!-- Employees -->
<div id="employees"></div>

<!-- Form -->
<div class="form">
  <input id="task" placeholder="Task" />

  <select id="priority">
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>

  <input id="days" type="number" placeholder="Deadline (days)" />

  <button id="mainBtn" onclick="addTask()">Add Task</button>
</div>

<div id="dashboard"></div>

<script type="module" src="app.js"></script>

</body>
</html>
