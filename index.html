<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════════════════════ -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">⚕</div>
    <div class="login-title">Office TaskFlow</div>
    <div class="login-sub">Select your name to continue</div>
    <div class="login-names" id="loginNames">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     MAIN APP  (hidden until login)
════════════════════════════════════════════════════ -->
<div class="app-screen" id="appScreen" style="display:none">

  <!-- ── HEADER ───────────────────────────────────── -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-left">
        <div class="header-avatar" id="headerAvatar"></div>
        <div>
          <div class="header-name" id="headerName"></div>
          <div class="header-role" id="headerRole"></div>
        </div>
      </div>
      <div class="header-right">
        <!-- admin only -->
        <button class="hdr-btn" id="exportBtn" onclick="exportTasks()" title="Export" style="display:none">📤</button>
        <button class="hdr-btn logout-btn" onclick="logout()" title="Switch user">⇄</button>
      </div>
    </div>
  </header>

  <!-- ── ADMIN: dept tabs + stats strip ───────────── -->
  <div id="adminControls" style="display:none">
    <div class="stats-strip" id="statsStrip"></div>
    <div class="dept-tabs-wrap">
      <div class="dept-tabs">
        <button class="dept-tab" data-dept="urgent-view" onclick="selectUrgentView()">🔴 Urgent</button>
        <button class="dept-tab active" data-dept="child" onclick="selectDepartment('child')">👶 Child</button>
        <button class="dept-tab" data-dept="oral"  onclick="selectDepartment('oral')">🦷 Oral</button>
        <button class="dept-tab" data-dept="ci"    onclick="selectDepartment('ci')">🔊 CI</button>
      </div>
    </div>

    <!-- Add task bar (admin only) -->
    <div class="add-bar-wrap">
      <div class="add-row">
        <input id="task" class="task-input" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask()"/>
        <button class="add-btn" onclick="addTask()" id="mainBtn">＋</button>
      </div>
      <div class="add-meta-row">
        <select id="assignTo" class="mini-select">
          <option value="">— Assign to —</option>
        </select>
        <select id="days" class="mini-select">
          <option value="0">Today</option>
          <option value="1">Tomorrow</option>
          <option value="2">In 2 days</option>
          <option value="3">In 3 days</option>
          <option value="5">In 5 days</option>
          <option value="7">In 1 week</option>
        </select>
        <div class="repeat-wrap">
          <select id="repeat" class="mini-select" onchange="onRepeatChange(this)">
            <option value="none">No repeat</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="custom">Custom…</option>
          </select>
          <div class="custom-days-wrap" id="customDaysWrap" style="display:none">
            <input id="customDays" type="number" min="1" max="365" class="custom-days-input" placeholder="n"/>
            <span class="custom-days-lbl">days</span>
          </div>
        </div>
        <div class="pri-group">
          <button class="pri-chip p1-chip" id="p1" onclick="selectPriority('p1')" title="Urgent">U</button>
          <button class="pri-chip p2-chip" id="p2" onclick="selectPriority('p2')" title="High">H</button>
          <button class="pri-chip p3-chip" id="p3" onclick="selectPriority('p3')" title="Normal">N</button>
          <button class="pri-chip p4-chip selected" id="p4" onclick="selectPriority('p4')" title="Low">L</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── STAFF: simple header strip ──────────────── -->
  <div id="staffStrip" style="display:none">
    <div class="staff-strip">
      <div class="staff-strip-inner" id="staffStripInner"></div>
    </div>
  </div>

  <!-- ── DASHBOARD ────────────────────────────────── -->
  <div class="cards-list" id="dashboard">
    <div class="loading-state"><div class="spinner"></div><p>Loading…</p></div>
  </div>

</div><!-- /appScreen -->

<!-- ── EDIT MODAL (admin only) ──────────────────── -->
<div class="modal-overlay" id="editModal" style="display:none" onclick="closeEditIfOutside(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Task</div>
    <input id="editTask" class="modal-input" placeholder="Task description"/>
    <div class="modal-row">
      <select id="editDays" class="mini-select flex1">
        <option value="0">Today</option><option value="1">Tomorrow</option>
        <option value="2">In 2 days</option><option value="3">In 3 days</option>
        <option value="5">In 5 days</option><option value="7">In 1 week</option>
      </select>
      <div class="repeat-wrap flex1">
        <select id="editRepeat" class="mini-select" onchange="onEditRepeatChange(this)">
          <option value="none">No repeat</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="custom">Custom…</option>
        </select>
        <div class="custom-days-wrap" id="editCustomDaysWrap" style="display:none">
          <input id="editCustomDays" type="number" min="1" max="365" class="custom-days-input" placeholder="n"/>
          <span class="custom-days-lbl">days</span>
        </div>
      </div>
    </div>
    <div class="modal-pri-label">Priority</div>
    <div class="modal-pri-row">
      <button class="mpri-btn p1-chip" id="ep1" onclick="selectEditPriority('p1')">🔴 Urgent</button>
      <button class="mpri-btn p2-chip" id="ep2" onclick="selectEditPriority('p2')">🟠 High</button>
      <button class="mpri-btn p3-chip" id="ep3" onclick="selectEditPriority('p3')">🔵 Normal</button>
      <button class="mpri-btn p4-chip" id="ep4" onclick="selectEditPriority('p4')">⚪ Low</button>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="modal-save"   onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- ── DELETE MODAL (admin only) ────────────────── -->
<div class="modal-overlay" id="deleteModal" style="display:none">
  <div class="modal-sheet compact">
    <div class="modal-handle"></div>
    <div class="del-icon">🗑</div>
    <div class="modal-title">Delete this task?</div>
    <p class="modal-sub">This cannot be undone.</p>
    <div class="modal-actions">
      <button class="modal-cancel"  onclick="closeDeleteModal()">Cancel</button>
      <button class="modal-del-btn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="app.js"></script>
</body>
</html>
